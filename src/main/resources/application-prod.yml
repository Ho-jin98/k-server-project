spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/k_server_project?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
#  kafka:
#    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
